version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: leite_db
    restart: always
    environment:
      POSTGRES_DB: catalogo_leite
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: